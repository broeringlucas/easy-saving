services:
  db:
    image: postgres:15-alpine
    container_name: easy-saving-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    image: node:18-alpine
    container_name: easy-saving-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./server:/usr/src/app
    working_dir: /usr/src/app
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_PORT=5432
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
    command: ["sh", "-c", "npm install && node app.js"]
    depends_on:
      - db

  client:
    image: node:18-alpine
    container_name: easy-saving-client
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:8080"
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    working_dir: /usr/src/app
    environment:
      - VITE_API_URL=${VITE_API_URL}
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    depends_on:
      - server

volumes:
  postgres_data: